<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Czompa după Shaorma</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(to bottom, #fff7e6, #ffe8b5);
      color: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 24px;
      max-width: 700px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      text-align: center;
    }

    .hero {
      background: #f8d77b;
      padding: 40px 20px;
    }

    .hero h1 {
      font-size: 3rem;
      line-height: 1.1;
      margin-bottom: 20px;
      color: #111;
    }

    .hero span {
      color: #c47b00;
    }

    .hero p {
      font-size: 1.2rem;
      margin-bottom: 25px;
    }

    .btn {
      display: inline-block;
      padding: 14px 28px;
      background: #111;
      color: white;
      text-decoration: none;
      border-radius: 999px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #333;
      transform: scale(1.05);
    }

    .image-section {
      padding: 30px;
    }

    .image-section img {
      width: 100%;
      border-radius: 20px;
    }

    footer {
      padding: 20px;
      background: #fff2cc;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <section class="hero">
      <h1>Czompa, du-te după <span>shaorma</span> acum!</h1>
      <p>Foame mare, chef și extra sos 🌯</p>
      <a href="#" class="btn">Ia o shaorma</a>
    </section>

    <section class="image-section">
      <img src="https://images.unsplash.com/photo-1529006557810-274b9b2fc783?q=80&w=1200&auto=format&fit=crop" alt="Înghețată de vanilie" />
    </section>

    <footer>
      © 2026 Shaorma Legends — Gustul care rezolvă orice foame.
    </footer>
  </div>
</body>
</html>
